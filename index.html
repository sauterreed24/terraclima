<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="light" />
    <meta name="theme-color" content="#fffefb" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta
      name="description"
      content="Terraclima — a hand-built North American microclimate atlas for serious readers and curious travelers. Rain shadows, sky islands, and thermal belts across the US, Canada, and Mexico — editorial geography, not a brokerage."
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Resource hints. preconnect lets the browser warm up the TLS
         handshake to the font CDNs before the stylesheet is parsed, which
         trims ~150 ms off the first contentful paint on typical
         residential links. dns-prefetch is a fallback for older
         environments that ignore preconnect. -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Google Fonts stylesheet. display=swap lets fallback UI show
         immediately so the app never flashes invisible text. Weights are
         pruned to the exact set the CSS actually uses. -->
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- Inline critical colour tokens so the warm paper background paints
         instantly while the bundle is fetched. -->
    <style>
      html, body { background: #fffefb; color: #221a14; }
      #root { min-height: 100vh; }
    </style>

    <title>Terraclima — North American Microclimate Atlas</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
